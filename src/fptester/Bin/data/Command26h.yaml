################################################
#
# Прочитать параметры шрифта
#
# Код команды: 26h. Длина сообщения: 6 байт.
#   Пароль системного администратора (4 байта)
#   Номер шрифта (1 байт)
#
# Ответ: 26h. Длина сообщения: 7 байт.
#   Код ошибки (1 байт)
#   Ширина области печати в точках (2 байта)
#   Ширина символа (1 байт)
#   Высота символа (1 байт)
#   Количество шрифтов (1 байт)
#
################################################
#
# Команда доступна в любом состоянии
# Команда не меняет состояние ФР
#
################################################

name: "Команда 26h"
description: "Прочитать параметры шрифта"

tests:
  - name: "26h-01: Параметры шрифта 1"
    testtype: command
    command: "26 1E 00 00 00 01"
    response: "26 00 XX XX XX XX XX"
    ecrmode_before: 4
    ecrmode_after: 4
    
  - name: "26h-02: Параметры шрифта 2"
    testtype: command
    command: "26 1E 00 00 00 02"
    response: "26 00 XX XX XX XX XX"
    
  - name: "26h-03: Параметры шрифта 255"
    testtype: command
    command: "26 1E 00 00 00 FF"
    resultcode: 51
    
  - name: "26h-04: Параметры шрифта 0"
    testtype: command
    command: "26 1E 00 00 00 00"
    resultcode: 51
    
  - name: "26h-05: Неверный пароль"
    testtype: command
    command: "26 FF FF FF FF 01"
    resultcode: 79
    
  - name: "26h-06: Неверная длина команды"
    testtype: command
    command: "26 1E 00 00 00"
    resultcode: 126