################################################
#
# Чтение таблицы
#
# Код команды: 1Fh. Длина сообщения: 9 байт.
#   Пароль системного администратора (4 байта)
#   Таблица (1 байт)
#   Ряд (2 байта)
#   Поле (1 байт)
#
# Ответ: 1Fh. Длина сообщения: (2+X) байт.
#   Код ошибки (1 байт)
#   Значение (X байт) до 40 или до 246 байт
#
################################################
#
# Команда доступна в любом состоянии
# Команда не меняет состояние ФР
#
################################################

name: "Команда 1Fh"
description: "Чтение таблицы"

tests:
  - name: "Чтение таблицы 1, ряд 1, поле 1"
    testtype: command
    command: "1F 1E 00 00 00 01 01 00 01"
    response: "1F 00 XX"
    ecrmode_before: 4
    ecrmode_after: 4
    
  - name: "Чтение таблицы 255, ряд 65535, поле 255"
    testtype: command
    command: "1F 1E 00 00 00 FF FF FF FF"
    resultcode: 93  # Таблица не определена
    
  - name: "Чтение таблицы с неверной таблицей 0"
    testtype: command
    command: "1F 1E 00 00 00 00 01 00 01"
    resultcode: 93  # Таблица не определена
    
  - name: "Чтение таблицы с неверным рядом 0"
    testtype: command
    command: "1F 1E 00 00 00 01 00 00 01"
    resultcode: 51
    
  - name: "Чтение таблицы с неверным рядом 255"
    testtype: command
    command: "1F 1E 00 00 00 01 00 FF 01"
    resultcode: 51
    
  - name: "Чтение таблицы с неверным полем 0"
    testtype: command
    command: "1F 1E 00 00 00 01 01 00 00"
    resultcode: 51
    
  - name: "Чтение таблицы с неверным паролем"
    testtype: command
    command: "1F FF FF FF FF 01 01 00 01"
    resultcode: 79
    
  - name: "Неверная длина команды (слишком короткая)"
    testtype: command
    command: "1F"
    resultcode: 126
    
  - name: "Неверная длина команды (8 байт)"
    testtype: command
    command: "1F 1E 00 00 00 01 01 00"
    resultcode: 126
    
  - name: "Неверная длина команды (10 байт)"
    testtype: command
    command: "1F 1E 00 00 00 01 01 00 01 00"
    resultcode: 126