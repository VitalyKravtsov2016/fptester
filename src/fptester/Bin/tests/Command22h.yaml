﻿################################################
#
# Программирование даты
#
# Код команды: 22h. Длина сообщения: 8 байт.
#   Пароль системного администратора (4 байта)
#   Дата (3 байта) ДД-ММ-ГГ
#
# Ответ: 22h. Длина сообщения: 2 байта.
#   Код ошибки (1 байт)
#
################################################
#
# Команда доступна в состояниях:
# 2. Открытая смена, 24 часа не кончились
# 3. Открытая смена, 24 часа кончились
# 4. Закрытая смена
# 6. Ожидание подтверждения ввода даты
# 8. Открытый документ
#
# Команда не меняет состояние ФР
#
################################################

name: "Команда 22h"
description: "Программирование даты"

tests:
  - name: "Установка даты 25.12.24"
    testtype: command
    command: "22 1E 00 00 00 19 0C 18"
    response: "22 00"
    ecrmode_before: 4
    ecrmode_after: 4
    
  - name: "Установка даты 01.01.00"
    testtype: command
    command: "22 1E 00 00 00 01 01 00"
    response: "22 00"
    
  - name: "Установка даты 31.12.99"
    testtype: command
    command: "22 1E 00 00 00 1F 0C 63"
    response: "22 00"
    
  - name: "Установка даты 29.02.24 (високосный)"
    testtype: command
    command: "22 1E 00 00 00 1D 02 18"
    response: "22 00"
    
  - name: "Команда доступна в состоянии 6 (ожидание даты)"
    testtype: command
    command: "22 1E 00 00 00 19 0C 18"
    response: "22 00"
    ecrmode_before: 6
    ecrmode_after: 6
    
  - name: "Команда недоступна в состоянии 1 (выдача данных)"
    testtype: command
    command: "22 1E 00 00 00 19 0C 18"
    ecrmode_before: 1
    ecrmode_after: 1
    resultcode: 115
    
  - name: "Неверная дата: день 32"
    testtype: command
    command: "22 1E 00 00 00 20 0C 18"
    resultcode: 51
    
  - name: "Неверная дата: месяц 13"
    testtype: command
    command: "22 1E 00 00 00 19 0D 18"
    resultcode: 51
    
  - name: "Неверная дата: день 0"
    testtype: command
    command: "22 1E 00 00 00 00 0C 18"
    resultcode: 51
    
  - name: "Неверная дата: месяц 0"
    testtype: command
    command: "22 1E 00 00 00 19 00 18"
    resultcode: 51
    
  - name: "Неверная дата: 31.04.24 (апрель - 30 дней)"
    testtype: command
    command: "22 1E 00 00 00 1F 04 18"
    resultcode: 51
    
  - name: "Неверная дата: 29.02.23 (не високосный)"
    testtype: command
    command: "22 1E 00 00 00 1D 02 17"
    resultcode: 51
    
  - name: "Неверный пароль"
    testtype: command
    command: "22 FF FF FF FF 19 0C 18"
    resultcode: 79
    
  - name: "Неверная длина команды"
    testtype: command
    command: "22 1E 00 00 00 19 0C"
    resultcode: 126